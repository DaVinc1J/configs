[font]
normal = { family = "JetBrainsMonoNL Nerd Font Mono", style = "Regular" }
bold = { family = "JetBrainsMonoNL Nerd Font Mono", style = "Bold" }
italic = { family = "JetBrainsMonoNL Nerd Font Mono", style = "Italic" }
bold_italic = { family = "JetBrainsMonoNL Nerd Font Mono", style = "BoldItalic" }
size = 14

[window]
opacity = 0.65
title = ""
padding = {x = 15, y = 15}
decorations = "none"
blur = true

[colors]
[colors.primary]
background = '#0f0908'
foreground = '#E0CCAE'

[colors.normal]
black = '#0c0706'
red = '#bf472c'
green = '#a4896f'
yellow = '#f2a766'
blue = '#d47d49'
magenta = '#8a4b53'
cyan = '#a67458'
white = '#F2A766'

[colors.bright]
black = '#392D2B'
red = '#bf472c'
green = '#a4896f'
yellow = '#f2a766'
blue = '#d47d49'
magenta = '#8a4b53'
cyan = '#a67458'
white = '#E0CCAE'

[[colors.indexed_colors]]
index = 16
color = '#ff9e64'

[[colors.indexed_colors]]
index = 17
color = '#df674c'
